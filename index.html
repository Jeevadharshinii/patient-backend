<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-box">
    <h2 class="login-title">Healthcare Portal Login</h2>

    <div class="role-switch">
        <button class="role-btn active" id="doctorBtn" onclick="selectRole('doctor')">Doctor</button>
        <button class="role-btn" id="caretakerBtn" onclick="selectRole('caretaker')">Caretaker</button>
    </div>

    <!-- ⭐ Hidden field to store selected role -->
    <input type="hidden" id="role" value="doctor">

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter Password">
            <span id="togglePassword" class="toggle-icon">👁️</span>
        </div>
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>


<script src="script.js"></script>

<script>
// SHOW / HIDE PASSWORD
const togglePassword = document.getElementById("togglePassword");
const passwordField = document.getElementById("password");

togglePassword.addEventListener("click", () => {
    const type = passwordField.type === "password" ? "text" : "password";
    passwordField.type = type;
    togglePassword.textContent = type === "password" ? "👁️" : "🙈";
});
</script>

</body>
</html>
